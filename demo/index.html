<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>aily-ui icons · demo</title>
<style>
  :root {
    --bg: #fcfcfc;
    --fg: #181818;
    --fg-muted: #6e6e73;
    --border: #efeff0;
    --accent: #2563eb;
    --bg-subtle: #f5f5f5;
  }
  @media (prefers-color-scheme: dark) {
    :root { --bg: #1c1c1c; --fg: #f0f0f0; --fg-muted: #909090; --border: #2c2c2c; --bg-subtle: #242424; }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif; background: var(--bg); color: var(--fg); margin: 0; padding: 24px; max-width: 760px; margin-inline: auto; }
  h1 { font-size: 28px; margin: 0 0 4px; letter-spacing: -0.012em; }
  h2 { font-size: 16px; margin: 32px 0 12px; letter-spacing: -0.012em; }
  .sub { color: var(--fg-muted); font-size: 13px; margin-bottom: 16px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(96px, 1fr)); gap: 8px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 16px 8px; background: var(--bg-subtle); border-radius: 12px; }
  .cell svg { color: var(--fg); width: 24px; height: 24px; stroke-width: 1.75; }
  .name { font-size: 11px; color: var(--fg-muted); }
  .row { display: flex; align-items: center; gap: 24px; padding: 16px; background: var(--bg-subtle); border-radius: 12px; flex-wrap: wrap; }
  .row svg { color: var(--fg); }
  .row .label { font-size: 11px; color: var(--fg-muted); margin-top: 4px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .spin { animation: ak-icon-spin 1s linear infinite; }
  @keyframes ak-icon-spin { to { transform: rotate(360deg); } }
  .back-to-index {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    padding: 8px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 9999px;
    color: var(--fg-muted);
    text-decoration: none;
    font-size: 13px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    transition: all 0.2s;
  }
  .back-to-index:hover {
    background: var(--bg-subtle);
    color: var(--fg);
  }
</style>
</head>
<body>
  <a href="https://yarnovo.github.io/aily-ui-core/" class="back-to-index">← 回 aily-ui 总站</a>
  <h1>aily-ui icons</h1>
  <p class="sub">封装 lucide · antd 风 props · 跨端 (Web + RN)</p>

  <h2>导航</h2>
  <div class="grid" id="nav"></div>

  <h2>方向</h2>
  <div class="grid" id="dir"></div>

  <h2>动作</h2>
  <div class="grid" id="act"></div>

  <h2>互动</h2>
  <div class="grid" id="int"></div>

  <h2>媒体 / 状态 / 其他</h2>
  <div class="grid" id="other"></div>

  <h2>变体 (size · spin)</h2>
  <div class="row">
    <div class="col"><i data-lucide="house" style="width:16px;height:16px"></i><div class="label">size 16</div></div>
    <div class="col"><i data-lucide="house" style="width:20px;height:20px"></i><div class="label">size 20</div></div>
    <div class="col"><i data-lucide="house" style="width:32px;height:32px"></i><div class="label">size 32</div></div>
    <div class="col"><i data-lucide="house" style="width:48px;height:48px"></i><div class="label">size 48</div></div>
    <div class="col"><i data-lucide="loader-circle" class="spin" style="width:24px;height:24px"></i><div class="label">spin</div></div>
  </div>
  <p class="sub" style="margin-top: 12px;">React 用法 <code style="background:var(--bg-subtle);padding:2px 6px;border-radius:4px">&lt;Home size={20} /&gt;</code> · 详见 <a href="https://github.com/yarnovo/aily-ui-icons">github</a></p>

<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
<script>
  // PascalCase → kebab-case · lucide UMD 用 createIcons({ icons: { Home, ... } })
  // 但 UMD 也支持按 data-lucide=kebab 自动渲染 (调一次 lucide.createIcons())
  const groups = {
    nav: ['Home', 'Search', 'Bell', 'User', 'MessageSquare', 'ShoppingBag', 'ShoppingCart', 'Settings'],
    dir: ['ChevronLeft', 'ChevronRight', 'ChevronDown', 'ChevronUp'],
    act: ['Plus', 'X', 'Check', 'Edit', 'Trash', 'Send', 'Filter', 'ArrowLeftRight', 'MoreHorizontal', 'MoreVertical'],
    int: ['Heart', 'Bookmark', 'Share', 'Star'],
    other: ['Camera', 'Image', 'Loader', 'Eye', 'EyeOff', 'At', 'Hash'],
  }
  // PascalCase → kebab (相邻大写交界插 -)
  const toKebab = (s) => s.replace(/([a-z0-9])([A-Z])/g, '$1-$2').replace(/([A-Z])([A-Z][a-z])/g, '$1-$2').toLowerCase()
  for (const [key, names] of Object.entries(groups)) {
    const container = document.getElementById(key)
    for (const n of names) {
      const cell = document.createElement('div')
      cell.className = 'cell'
      cell.innerHTML = `<i data-lucide="${toKebab(n)}"></i><div class="name">${n}</div>`
      container.appendChild(cell)
    }
  }
  lucide.createIcons()
</script>

</body>
</html>
